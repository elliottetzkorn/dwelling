        function filter(roomType) {
            var container = document.getElementById('image-container');
            container.innerHTML = '';

            const filteredArray = emailToRoomArray.filter(room => roomType == "all" || room.name === roomType);

            filteredArray.sort(() => Math.random() - 0.5);

            for (var i in filteredArray) {
                var room = filteredArray[i];
                var smallImage = 'rooms_small/' + room['path'] + '.jpg';
                var largeImage = 'rooms/' + room['path'] + '.jpg';

                var img = document.createElement('img');
                img.src = smallImage;
                img.loading = 'lazy';

                var paragraph = document.createElement('p');
                var div = document.createElement('div');

                var username = document.createElement('strong');
                username.textContent = room['username'];
                paragraph.appendChild(username);

                paragraph.appendChild(document.createElement('br'));
                var city = document.createTextNode(room['city_name']);
                paragraph.appendChild(city);

                if (room['state_name'] != null) {
                    var state = document.createTextNode(', ' + room['state_name']);
                    paragraph.appendChild(state);
                } else if (room['country_name'] != null) {
                    var country = document.createTextNode(', ' + room['country_name']);
                    paragraph.appendChild(country);
                }

                if (room['caption'] != null) {
                    paragraph.appendChild(document.createElement('br'));
                    paragraph.appendChild(document.createElement('br'));
                    var caption = document.createElement('i');
                    caption.textContent = '"' + room['caption'] + '"';
                    paragraph.appendChild(caption);

                }

                var link = document.createElement('a');
                link.href = largeImage;
                link.textContent = 'Full size';
                link.target = '_blank';



                div.appendChild(paragraph);
                div.appendChild(document.createElement('br'));
                div.appendChild(link);

                if (room['email'] != null) {
                    var emailLink = document.createElement('a');
                    emailLink.href = 'mailto:' + room['email'];
                    emailLink.textContent = 'Contact';
                    emailLink.target = '_blank';

                    div.appendChild(document.createElement('br'));
                    div.appendChild(emailLink);
                }



                container.appendChild(img);
                container.appendChild(div);
            }
        }

        filter("all");
    </script>
